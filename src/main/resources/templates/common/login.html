<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ログイン</title>
<link rel="stylesheet" th:href="@{/css/common/bootstrap.min.css}">
<script defer th:src="@{/js/common/bootstrap.bundle.min.js}"></script>
</head>
<body class="bg-light">
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
      <h3 class="text-center mb-4">ログイン</h3>
      <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="mb-3">
          <label for="email" class="form-label">メールアドレス</label> <input type="email" class="form-control" id="email"
            name="login_email">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">パスワード</label> <input type="password" class="form-control"
            id="password" name="login_password">

<!--  パスワードとメールが間違ってた時のエラー表示 param.error でクエリパラメータを判定できます。-->
          <div th:if="${param.error}" class="text-danger mt-2">メールアドレスまたはパスワードが違います</div>
          <div id="error_message_label" class="text-danger mt-1" style="display: none;"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">ログイン</button>
      </form>
    </div>
  </div>
  <script th:src="@{/js/common/login.js}"></script>
</body>
</html>
