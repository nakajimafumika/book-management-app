<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{bookSystem/common/layout}">

<head>
<title>書籍登録</title>
<!-- css -->
<link rel="stylesheet" th:href="@{/css/common/layout.css}">
<link rel="stylesheet"  th:href="@{/css/book-register.css}">

<!-- js -->
<script type="module" th:src="@{/js/book-register.js}"></script>
</head>

<body>
  <section layout:fragment="content">
    <div class="container">
      <div class="row">
        <!-- タイトル -->
        <div class="row justify-content-center mt-4">
          <div class="col-md-4 text-center">
            <h2>書籍登録</h2>
          </div>
        </div>

        <!-- 入力欄 -->
        <div class="container mt-5 mb-5">
          <div class="row">
            <!-- 左側：書籍情報 -->
            <div class="col-md-6 offset-md-2">
              <div class="mb-3 field">
                <label for="isbnCode" class="form-label required"> ISBN <span class="text-danger">*</span> <span
                  class="tooltip">必須</span>
                </label>
                <div class="input-group">
                  <input type="number" id="isbnCode" class="form-control" placeholder="ISBNコードを入力してください">
                  <button id="searchButton" class="btn btn-primary btn-sm">検索</button>
                </div>
              </div>

              <div class="mb-3 field">
                <label for="title" class="form-label required"> タイトル <span class="text-danger">*</span> <span
                  class="tooltip">必須</span>
                </label> <input type="text" id="title" class="form-control" placeholder="タイトルを入力">
              </div>

              <div class="mb-3 field">
                <label for="author" class="form-label required"> 著者 <span class="text-danger">*</span> <span
                  class="tooltip">必須</span>
                </label> <input type="text" id="author" class="form-control" placeholder="著者を入力">
              </div>

              <div class="mb-3 field">
                <label for="publisher" class="form-label required"> 出版社 <span class="text-danger">*</span> <span
                  class="tooltip">必須</span>
                </label> <input type="text" id="publisher" class="form-control" placeholder="出版社を入力">
              </div>

              <div class="mb-3 field">
                <label for="publicationDate" class="form-label required"> 出版日 <span class="text-danger">*</span>
                  <span class="tooltip">必須</span>
                </label> <input type="text" id="publicationDate" class="form-control" placeholder="発行日を入力">
              </div>

              <div class="mb-3 field">
                <label for="managementId" class="form-label required"> 管理番号 <span class="text-danger">*</span> <span
                  class="tooltip">必須</span>
                </label> <input type="text" id="managementId" class="form-control" placeholder="管理番号を入力">
              </div>

              <p class="text-muted">※すべての入力欄は必須です</p>

              <!-- フォームから登録ボタン -->
              <div class="d-flex justify-content-center mt-3">
                <button id="formRegisterButton" class="btn btn-primary btn-lg">フォームから登録</button>
              </div>

              <!-- ファイルから書籍登録 -->
              <h5 class="mt-4">ファイルから書籍登録</h5>

              <!-- ファイルアップロード -->
              <div class="mb-3">
                <input type="file" id="bookFile" class="form-control"
                  accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel">
                <div class="form-text">アップロード可能な形式: CSV, Excel (.xlsx, .xls)</div>
              </div>

              <!-- ファイルから登録ボタン -->
              <div class="d-flex justify-content-center mt-3">
                <button id="fileRegisterButton" class="btn btn-success btn-lg">ファイルから登録</button>
              </div>
            </div>

            <!-- 右側：表紙表示＆アップロード部分 -->
            <!-- 初期状態は全部非表示 -->
            <div id="uploadSection" class="d-none col-md-4 text-center">

              <!-- 表紙画像 -->
              <img id="bookImage" class="img-fluid mb-3" style="max-width: 200px;" alt="書影">

              <!-- 画像アップロードフォーム -->
              <div class="d-flex flex-column align-items-center">
                <!-- ファイル選択を上に -->
                <label for="uploadBookImage" class="btn btn-secondary">ファイルを選択</label> <input id="uploadBookImage"
                  type="file" accept="image/*" class="d-none">
              </div>

            </div>
          </div>
        </div>

        <!-- ここにモーダルを差し込む -->
        <div th:replace="component/registerLoadModal :: registerModal"></div>


      </div>
    </div>

    <!-- メニューに戻るボタン -->
    <a th:href="@{/book/list}" class="btn btn-secondary mt-2"> <i class="fa-solid fa-arrow-left me-2"></i> メニュー画面に戻る
    </a>

  </section>
</body>
</html>
