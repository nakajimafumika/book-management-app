<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{bookSystem/common/layout}">

<head>
<title>書籍詳細</title>

<link rel="stylesheet" th:href="@{/css/common/layout.css}">
<link rel="stylesheet" th:href="@{/css/book-detail.css}">

<!-- flatpickr -->
<link rel="stylesheet" th:href="@{/css/common/flatpickr.min.css}">

<!-- font-awesomeのCDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- loan.jsで使用するCSS -->
<link rel="stylesheet" th:href="@{/css/loan.css}">

<!-- 貸出・予約js -->
<script type="module" th:src="@{/js/loan.js}"></script>
<script type="module" th:src="@{/js/reserve.js}"></script>

<!-- レビュー星のjs -->
<script defer th:src="@{/js/starRating.js}"></script>
</head>

<body>
  <section layout:fragment="content">

    <div class="container mt-5 mb-5">
      <div class="row">
        <!-- 画面左側：書籍情報 -->
        <div class="col-md-8">
          <ul class="list-group mb-3">
            <li class="list-group-item"><strong>書籍名：</strong> <span th:text="${book.title}">書籍名</span></li>
            <li class="list-group-item"><strong>著者：</strong> <span th:text="${book.author}">著者名</span></li>
            <li class="list-group-item"><strong>出版社：</strong> <span th:text="${book.publisher}">出版社名</span></li>
            <li class="list-group-item"><strong>出版日：</strong> <span th:text="${book.publicationDate}">出版日</span></li>
            <li class="list-group-item"><strong>貸出状況：</strong> <span th:text="${book.loanStatus}">貸出状況</span></li>
            <li class="list-group-item"><strong>返却予定日：</strong> <span th:text="${book.returnDueDate}">返却予定日</span></li>
            <li class="list-group-item"><strong>予約状況：</strong> <span th:text="${book.reserveStatus}">予約状況</span></li>
            <li class="list-group-item"><strong>ISBN：</strong> <span th:text="${book.isbnCode}">978-4-xx</span></li>
            <li class="list-group-item"><strong>管理番号：</strong> <span th:text="${book.managementId}">BK-00123</span></li>
          </ul>
        </div>

        <!-- 画面右側：表紙画像＋評価・コメント -->
        <div class="col-4 text-center">

          <!-- bookImageName がある場合 -->
          <img th:if="${book.bookImageName != null}" th:src="@{'/bookImages/' + ${book.bookImageName}}" alt="表紙画像"
            class="img-fluid mb-2" />

          <!-- ISBN がある場合 -->
          <img th:if="${book.bookImageName == null and book.isbnCode != null}"
            th:src="'https://ndlsearch.ndl.go.jp/thumbnail/' + ${#strings.replace(book.isbnCode, '-', '')} + '.jpg'"
            alt="表紙画像" class="img-fluid mb-2"
            th:onerror="'this.onerror=null; this.src=\'' + @{/images/noimage.png} + '\';'" />

          <!-- どちらもない場合 -->
          <img th:if="${book.bookImageName == null and book.isbnCode == null}" th:src="@{/images/noimage.png}"
            alt="表紙画像" class="img-fluid mb-2" />

          <!-- 評価とコメント -->
          <h4 class="mt-3">評価・コメント</h4>

          <!-- 星の表示 -->
          <div id="starRating" th:data-score="${book.review}"></div>

          <!-- コメント一覧 -->
          <ul class="list-group mt-2" style="max-height: 120px; overflow-y: auto;">
            <li class="list-group-item" th:each="comment : ${book.comments}" th:text="${comment}">コメント内容</li>
          </ul>

        </div>
      </div>
    </div>

    <!-- 予約・貸出ボタンの位置 -->
    <div class="d-flex justify-content-center gap-5">

      <!--予約ボタン（予約可能な場合） -->
      <div th:unless="${book.alreadyReserved}">
        <button type="button" class="reservation_button" data-bs-toggle="modal" data-bs-target="#reserveModal">
          <i class="fa-solid fa-calendar-check me-2"></i> 予約
        </button>
      </div>

      <!--予約ボタン（予約不可の場合） -->
      <div th:if="${book.alreadyReserved}" class="btn disabled d-flex align-items-center text-primary fs-5">
        <i class="fa-solid fa-ban me-2"></i> 既に予約しています
      </div>

      <!-- 予約モーダル読み込み -->
      <div th:replace="~{bookSystem/bookList/reserve :: reserveModal}"></div>


      <!-- 貸出ボタン(貸出可能な場合) -->
      <div th:unless="${book.loans}">
        <input type="hidden" id="id" th:value="${book.id}" />
        <button type="button" class="loan_button" data-bs-toggle="modal" data-bs-target="#loanModal">
          <i class="fa-solid fa-book-open me-2"></i> 貸出
        </button>
      </div>


      <!-- 貸出ボタン(貸出不可の場合) -->
      <div th:if="${book.loans}" class="btn disabled d-flex align-items-center text-danger fs-5">
        <i class="fa-solid fa-ban me-2"></i> 貸出不可
      </div>

    </div>

    <!-- 貸出モーダル読み込み -->
    <div th:replace="~{bookSystem/bookList/loan :: loanModal}"></div>

    <!-- 一覧に戻るボタン -->
    <a th:href="@{/book/list}" class="btn btn-secondary"> <i class="fa-solid fa-arrow-left me-2"></i> 一覧に戻る
    </a>

  </section>
</body>
</html>
