<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{bookSystem/common/layout}">

<head>
<title>書籍一覧</title>
<link rel="stylesheet" th:href="@{/css/common/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/common/layout.css}">
<link rel="stylesheet" th:href="@{/css/common/tabulator.min.css}">
<!-- book-list.js -->
 <script type="module" th:src="@{/js/book-list.js}"></script>
<!-- 本の一覧出力js -->
<script type="module" th:src="@{/js/book-export.js}"></script>
</head>

<body>
  <section layout:fragment="content">
  <div class="row justify-content-center mt-4">
    <div class="col-md-4 text-center">
    <h3>書籍一覧</h3>
    </div>
  </div>
  

<div class="row justify-content-center">
  <div class="col-md-10">
    <div class="d-flex justify-content-end me-5 pb-4">
      <a th:href="@{/book/menu}" class="btn btn-secondary">メニューに戻る</a>
    </div>
  </div>
</div>

    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="d-flex gap-2">
		  
		  <!-- キーワード検索 -->
		  <div class="flex-grow-1">
		    <input type="text" id="searchInput" class="form-control" placeholder="タイトルまたは作者で検索">
		  </div>

		  
		  <!-- 貸出状況の絞り込み -->
		  <div class="w-auto">
		    <select id="statusSelector" class="form-select">
		      <option value="">すべて表示</option>
		      <option value="貸出中">貸出中</option>
		      <option value="除外:貸出中">貸出中を除く</option>
		    </select>
		  </div>


          <!-- 並び替え　-->
          <div class="w-auto">
			<select id="sortSelector" class="form-select">
              <option value="">並び替えなし</option>
              <option value="new">新着順</option>
              <option value="rating">評価の高い順</option>
            </select>
          </div>

        </div>
      </div>
    </div>



 <!-- 表の表示領域 + 出力フォームを同じ幅に -->
<div class="row justify-content-center mt-4">
  <div class="col-md-10">
    <!-- 表 -->
    <div id="book-list"></div>

    <!-- CSV・EXCELで出力 -->
<form id="exportForm" class="mt-4">
  <label for="format" class="h5 fw-bold">書籍一覧出力</label>
  <select id="format" name="format" class="form-control" required>
    <option value="" disabled selected>出力形式を選択してください</option>
    <option value="csv">CSV</option>
    <option value="excel">Excel</option>
    <option value="pdf">PDF</option>
  </select>
  <button type="submit" class="btn btn-primary mt-3">出力</button>
</form>

    
<a th:href="@{/api/book-list/view}" target="_blank" class="btn btn-secondary mt-3">
  PDFで書籍一覧を表示
</a>

 <!-- ここにモーダルを差し込む -->
        <div th:replace="component/registerLoadModal :: registerModal"></div>

  </div>
</div>
 
 </section>

</body>


</html>
