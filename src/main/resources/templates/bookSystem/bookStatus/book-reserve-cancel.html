<!-- キャンセルモーダル -->
<div th:fragment="cancelModal">
  <div class="modal fade" id="cancelModal" tabindex="-1" aria-labelledby="cancelModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="cancelModalLabel">予約キャンセル確認</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- キャンセルモーダル -->
          <p id="cancelMessage" class="fs-5 text-center fw-bold"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">戻る</button>
          <button type="button" class="btn btn-warning" id="confirmCancelButton">予約をキャンセルする</button>
        </div>
      </div>
    </div>
  </div>
</div>
