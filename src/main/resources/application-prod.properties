
spring.application.name=OfficeSystem

## MariaDB
spring.datasource.driverClassName = com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/officesystem
spring.datasource.username=officesystem
spring.datasource.password=${DB_PASSWORD}

## JPA設定
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

## Thymeleaf
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ログファイルの出力先とファイル名
logging.file.name=logs/myapp.log
 
# ログレベル（任意）
logging.level.root=INFO

spring.security.oauth2.client.registration.azure.client-id=121dde2e-4bb5-45ef-8c41-a5f8ae56bb86
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.azure.scope=openid, profile, email
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/azure
spring.security.oauth2.client.provider.azure.issuer-uri=https://login.microsoftonline.com/5f637079-aca8-464c-9d26-04ecb7411693/v2.0


